<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mona Bavarian Lab Website</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #1f2933;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
    }

    main {
      max-width: 960px;
      margin: 60px auto;
      padding: 0 16px;
    }

    .hero {
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 24px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .hero h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 1.1rem;
      color: #4b5563;
      margin-bottom: 4px;
    }

    footer {
      margin-top: 40px;
      padding: 16px;
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Mona Bavarian</div>
  </header>

  <main>
    <section class="hero">
      <h1>Mona Bavarian Lab Website</h1>
      <p>Mona Bavarian Lab Website coming soon!</p>
    </section>
  </main>

  <footer>
    © 2026 Mona Bavarian Lab.
  </footer>
</body>
</html>
